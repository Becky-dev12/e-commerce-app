<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Bag body -->
  <rect x="8" y="22" width="48" height="34" rx="6" ry="6" fill="url(#bagGrad)"/>

  <!-- Shine overlay on bag -->
  <rect x="8" y="22" width="48" height="14" rx="6" ry="6" fill="white" opacity="0.12"/>

  <!-- Handle left arc -->
  <path d="M22 22 C22 10, 42 10, 42 22"
        fill="none"
        stroke="url(#handleGrad)"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Tag dot (decorative) -->
  <circle cx="32" cy="38" r="4" fill="white" opacity="0.9"/>
  <rect x="31" y="38" width="2" height="7" rx="1" fill="white" opacity="0.7"/>
</svg>
